<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Reclamos — Cooperativa</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="img/logo-cooperativa.png" alt="Logo" class="logo-header">
    <div>
      <div class="header-tag">Sistema interno · Cooperativa Luz y Fuerza</div>
      <h1>Registro de Reclamos</h1>
      <p>Ingreso manual de reclamos por parte del personal de la cooperativa.</p>
    </div>
  </header>

  <div class="card">
    <form id="formReclamo" novalidate>
      <p class="section-label">01 — Servicio</p>
      <div class="field">
        <label for="servicio">Servicio <span class="req">*</span></label>
        <select id="servicio" name="servicio" required>
          <option value="" disabled selected>Seleccionar servicio…</option>
          <optgroup label="Sector Energía">
            <option value="ENERGIA">Energía eléctrica</option>
            <option value="ALUMBRADO">Alumbrado público</option>
          </optgroup>
          <optgroup label="Sector TIC">
            <option value="INTERNET">Internet</option>
            <option value="TELEVISION">Televisión</option>
            <option value="TELEFONIA">Telefonía</option>
          </optgroup>
        </select>
      </div>

      <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;" />

      <p class="section-label">02 — Datos del solicitante</p>
      <div class="grid-2">
        <div class="field">
          <label for="suministro">N° de suministro <span class="req">*</span></label>
          <input type="text" id="suministro" name="suministro" placeholder="Ej: 12345" required />
        </div>
        <div class="field">
          <label for="telefono">Teléfono <span class="opt">(opcional)</span></label>
          <input type="text" id="telefono" name="telefono" placeholder="Ej: 3743 123456" />
        </div>
        <div class="field span-2">
          <label for="nombre">Nombre y apellido <span class="req">*</span></label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required />
        </div>
        <div class="field span-2">
          <label for="direccion">Dirección <span class="req">*</span></label>
          <input type="text" id="direccion" name="direccion" placeholder="Ej: Av. Culmey 90" required />
        </div>
      </div>

      <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;" />

      <p class="section-label">03 — Detalle del reclamo</p>
      <div class="field">
        <label for="descripcion">Descripción <span class="req">*</span></label>
        <textarea id="descripcion" name="descripcion" placeholder="Describí el problema reportado…" required></textarea>
      </div>
      <div class="field">
        <label for="gps">Ubicación GPS <span class="opt">(opcional - coordenadas lat,long o link a mapa de google o GIS)</span></label>
        <input type="text" id="gps" name="gps" placeholder="Ej: -27.3617, -55.8961" />
      </div>

      <button type="submit" id="btnEnviar">Registrar reclamo</button>
    </form>
  </div>

  <div id="toast"></div>

  <script>
    // ... tu código de JavaScript anterior ...
  </script>
</body>
</html>
